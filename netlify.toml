[build]
  publish = "."

[[redirects]]
  from = "/life"
  to = "/sq-life.html"
  status = 200

[[redirects]]
  from = "/general"
  to = "/sq-general.html"
  status = 200

[[redirects]]
  from = "/home"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
